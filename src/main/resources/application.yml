  #spring.application.name=oms-product-service

  server:
    port: 8082

  spring:
    application:
        name: oms-product-service

    datasource:
        url: jdbc:postgresql://localhost:5434/oms_product_db
        username: postgres
        password: admin
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

    redis:
        host: localhost
        port: 6379